<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Dashboard หอพักเลขที่ 5</title>
<style>
:root{
  --bg:#f4f6fb; --panel:#ffffff; --ink:#1f2733; --muted:#6b7688; --line:#e6eaf2;
  --brand:#2563eb; --brand-d:#1d4ed8; --brand-soft:#eaf1ff;
  --green:#16a34a; --green-soft:#e7f6ee; --red:#dc2626; --red-soft:#fdecec;
  --amber:#d97706; --amber-soft:#fdf3e3; --water:#0ea5e9; --elec:#f59e0b;
  --radius:14px; --shadow:0 1px 3px rgba(20,30,60,.06),0 6px 24px rgba(20,30,60,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Sarabun",system-ui,-apple-system,"Helvetica Neue","Segoe UI","Noto Sans Thai",sans-serif;
  background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
  -webkit-text-size-adjust:100%;
}
h1,h2,h3{margin:0;font-weight:700;line-height:1.25}
a{color:var(--brand);text-decoration:none}
button{font-family:inherit}
.appbar{
  position:sticky;top:0;z-index:30;background:var(--brand);
  background:linear-gradient(120deg,#2563eb,#4f46e5);
  color:#fff;padding:12px 18px;display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 12px rgba(37,99,235,.25);
}
.appbar .logo{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.18);
  display:grid;place-items:center;font-size:19px;flex:none}
.appbar h1{font-size:17px;letter-spacing:.2px}
.appbar .sub{font-size:12px;opacity:.85;font-weight:400}
.appbar .sync{margin-left:auto;font-size:12.5px;font-weight:600;white-space:nowrap;padding-left:12px;text-align:right}
@media(max-width:560px){.appbar .sync{font-size:11px;max-width:120px;white-space:normal}}
.nav{position:sticky;top:58px;z-index:25;background:var(--panel);border-bottom:1px solid var(--line);
  display:flex;gap:2px;padding:0 10px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.nav button{
  border:0;background:transparent;color:var(--muted);padding:13px 14px;font-size:14.5px;
  font-weight:600;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;
  display:flex;align-items:center;gap:7px;
}
.nav button .ic{font-size:16px}
.nav button:hover{color:var(--ink)}
.nav button.active{color:var(--brand);border-bottom-color:var(--brand)}
.wrap{max-width:1080px;margin:0 auto;padding:20px 16px 80px}
.page-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.page-head h2{font-size:22px}
.page-head .desc{color:var(--muted);font-size:13.5px;margin-top:3px;font-weight:400}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.card h3{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h3 .ic{font-size:18px}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:860px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}}
@media(max-width:560px){.g4{grid-template-columns:1fr}}
/* stat cards */
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow)}
.stat .lab{font-size:13px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
.stat .val{font-size:24px;font-weight:800;margin-top:6px;letter-spacing:-.3px}
.stat .val small{font-size:13px;font-weight:600;color:var(--muted)}
.stat .delta{font-size:12px;margin-top:3px;font-weight:600}
.stat.accent-b{border-top:3px solid var(--brand)}
.stat.accent-g{border-top:3px solid var(--green)}
.stat.accent-w{border-top:3px solid var(--water)}
.stat.accent-e{border-top:3px solid var(--elec)}
.pos{color:var(--green)} .neg{color:var(--red)}
/* forms */
label.f{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:5px}
input,select,textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:15px;
  font-family:inherit;background:#fff;color:var(--ink);
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--brand-soft);border-color:var(--brand)}
input[type=number]{text-align:right}
.field{margin-bottom:12px}
.btn{border:0;border-radius:10px;padding:10px 16px;font-size:14.5px;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;background:var(--brand-soft);color:var(--brand-d)}
.btn:hover{filter:brightness(.98)}
.btn.primary{background:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-d)}
.btn.green{background:var(--green);color:#fff}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
.btn.danger{background:var(--red-soft);color:var(--red)}
.btn.sm{padding:6px 11px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.row-actions{display:flex;gap:8px;flex-wrap:wrap}
/* tables */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;border:1px solid var(--line)}
table{border-collapse:collapse;width:100%;font-size:14px;background:#fff}
th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{background:#f8fafd;color:var(--muted);font-weight:700;font-size:12.5px;position:sticky;top:0}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover{background:#fafbff}
tbody tr:last-child td{border-bottom:0}
.tag{display:inline-block;padding:2px 9px;border-radius:999px;font-size:12px;font-weight:700}
.tag.g{background:var(--green-soft);color:var(--green)}
.tag.r{background:var(--red-soft);color:var(--red)}
.tag.b{background:var(--brand-soft);color:var(--brand-d)}
.tag.m{background:#eef1f6;color:var(--muted)}
.muted{color:var(--muted)}
.small{font-size:12.5px}
.hint{font-size:12.5px;color:var(--muted);margin-top:4px}
.warn{background:var(--amber-soft);color:#8a5a00;border:1px solid #f2d9a8;border-radius:10px;padding:10px 12px;font-size:13px;margin:8px 0;display:flex;gap:8px;align-items:flex-start}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.seg{display:inline-flex;background:#eef1f6;border-radius:10px;padding:3px}
.seg button{border:0;background:transparent;padding:7px 14px;border-radius:8px;font-weight:700;font-size:13.5px;color:var(--muted);cursor:pointer}
.seg button.active{background:#fff;color:var(--brand);box-shadow:0 1px 3px rgba(0,0,0,.08)}
/* room cards */
.roomcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;position:relative}
.roomcard .rn{display:flex;align-items:center;justify-content:space-between}
.roomcard .badge{width:44px;height:44px;border-radius:11px;background:var(--brand-soft);color:var(--brand-d);
  display:grid;place-items:center;font-weight:800;font-size:17px}
.roomcard .badge.empty{background:#eef1f6;color:var(--muted)}
.roomcard .nm{font-weight:700;margin-top:10px;font-size:15.5px}
.roomcard .ph{color:var(--muted);font-size:13px}
.roomcard .meta{display:flex;gap:14px;margin-top:10px;font-size:13px;color:var(--muted);flex-wrap:wrap}
.roomcard .meta b{color:var(--ink)}
/* charts */
.chart{width:100%}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12.5px;color:var(--muted);margin-top:8px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
/* modal */
.modal-back{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:50;display:grid;place-items:center;padding:16px}
.modal{background:#fff;border-radius:16px;max-width:640px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal .mhead{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff}
.modal .mbody{padding:18px}
.modal .mfoot{padding:14px 18px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}
.iconbtn{border:0;background:transparent;font-size:20px;cursor:pointer;color:var(--muted);width:32px;height:32px;border-radius:8px}
.iconbtn:hover{background:#f1f3f8}
/* invoice */
.inv-line{display:grid;grid-template-columns:28px 1fr 84px 96px 110px 34px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px dashed var(--line)}
.inv-line .idx{color:var(--muted);text-align:center;font-weight:700}
.inv-line input{padding:7px 9px;font-size:14px}
@media(max-width:640px){
  .inv-line{grid-template-columns:1fr 1fr;gap:6px}
  .inv-line .idx{display:none}
}
/* printable slip */
.slip{background:#fff;border:1px solid var(--line);border-radius:12px;padding:26px;max-width:520px;margin:0 auto;color:#111}
.slip .sh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:14px}
.slip .sh h2{font-size:20px}
.slip .sh .bldg{font-size:13px;color:#555;margin-top:2px}
.slip .sh .rt{text-align:right;font-size:12.5px;color:#555}
.slip .who{display:flex;justify-content:space-between;font-size:14px;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.slip table{font-size:14px}
.slip table th{background:#f3f4f6;position:static}
.slip .totrow td{font-weight:800;font-size:15px;border-top:2px solid #111}
.slip .note{margin-top:14px;font-size:13px;color:#333;background:#f7f8fa;border-radius:8px;padding:10px 12px;white-space:pre-wrap}
.slip .foot{margin-top:18px;display:flex;justify-content:space-between;font-size:12px;color:#777}
.empty-state{text-align:center;color:var(--muted);padding:40px 20px}
.empty-state .em{font-size:40px;margin-bottom:10px}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:13.5px}
.kv .k{color:var(--muted)}
.kv .v{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
.divider{height:1px;background:var(--line);margin:12px 0}
@media print{
  .appbar,.nav,.no-print,.page-head{display:none !important}
  body{background:#fff}
  .wrap{padding:0;max-width:none}
  .grid.g2{display:block}
  .card{box-shadow:none;border:0;padding:0;margin:0}
  .slip{border:0;max-width:none;padding:0}
  .slip .foot{display:none}
  /* print only the invoice slip, nothing else on the page */
  body *{visibility:hidden}
  #printable,#printable *{visibility:visible}
  #printable{position:absolute;left:0;top:0;width:100%}
}
.footer-note{text-align:center;color:var(--muted);font-size:12px;margin-top:30px}
.pill-toggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
.pill-toggle button{border:0;background:#fff;padding:6px 14px;font-weight:700;font-size:13px;color:var(--muted);cursor:pointer}
.pill-toggle button.active{background:var(--brand);color:#fff}
</style>
</head>

    const sheetHasData = j && j.ok && j.data && Array.isArray(j.data.rooms) && j.data.rooms.length>0;
    if(dirty){
      // local has un-synced edits -> local wins, push it up
      await pushToSheet();
    }else if(sheetHasData){
      state=normalizeState(j.data);
      localStorage.setItem(LSKEY, JSON.stringify(state));
      localStorage.setItem(DIRTYKEY,"0");
      setSync("saved");
      router();
    }else{
      // sheet is empty (first run) -> seed it from the current (Excel-seeded) data
      await pushToSheet();
      router();
    }
  }catch(e){ setSync("offline", e.message); }
}
function setSync(st, err){
  syncState=st; syncErr=err||"";
  const map={
    loading:["⏳ กำลังโหลดจาก Sheet…","#fff"],
    saving:["⏳ กำลังบันทึกขึ้น Sheet…","#fff"],
    saved:["☁️ ซิงค์กับ Sheet แล้ว","#dcfce7"],
    dirty:["• กำลังจะบันทึก…","#fff"],
    offline:["⚠️ ออฟไลน์ (เก็บในเครื่องไว้ก่อน)","#fee2e2"],
    local:["💾 โหมดในเครื่อง (ยังไม่เชื่อม Sheet)","#fff"]
  };
  const el=document.getElementById("syncStatus");
  if(el){ const m=map[st]||["",""]; el.textContent=m[0]; el.style.color=m[1]; el.title=err?("รายละเอียด: "+err):"สถานะการซิงค์กับ Google Sheet"; }
  const s2=document.getElementById("st_syncline");
  if(s2){ const m=map[st]||["",""]; s2.textContent=m[0]+(err?(" — "+err):""); }
}

/* ==================== domain logic ==================== */
function roomLabel(rid){return state.roomLabels[rid]||rid;}
function tenantName(rid){const t=state.tenants[rid]||{};const n=`${t.firstName||""} ${t.lastName||""}`.trim();return n;}
function allReadingPeriods(readings){return Object.keys(readings).sort();}
// periods that have a value for a given room, sorted asc
function roomReadingPeriods(readings,rid){
  return Object.keys(readings).filter(p=>readings[p] && readings[p][rid]!=null && readings[p][rid]!=="").sort();
}
function readingVal(readings,p,rid){const r=readings[p];const v=r?r[rid]:null;return (v==null||v==="")?null:num(v);}
// previous period (with a value for rid) strictly before `p`
function prevReadingPeriod(readings,rid,p){
  const ps=roomReadingPeriods(readings,rid).filter(x=>x<p);
  return ps.length?ps[ps.length-1]:null;
}
function nextReadingPeriod(readings,rid,p){
  const ps=roomReadingPeriods(readings,rid).filter(x=>x>p);
  return ps.length?ps[0]:null;
}
// usage attributed TO month `period` = reading(next) - reading(period)  (matches landlord convention)
function usageForMonth(readings,rid,period){
  const nxt=nextReadingPeriod(readings,rid,period);
  if(!nxt)return null;
  const cur=readingVal(readings,nxt,rid), prev=readingVal(readings,period,rid);
  if(cur==null||prev==null)return null;
  return {units:cur-prev, from:period, to:nxt, prevVal:prev, curVal:cur};
}
// income for a period: seed history overridden by saved invoices (per room)
function incomeForPeriod(period){
  const byRoom={};
  const seed=state.incomeHistory[period]||{};
  for(const rid of state.rooms){ if(seed[rid]!=null) byRoom[rid]=num(seed[rid]); }
  for(const inv of state.invoices){ if(inv.period===period) byRoom[inv.roomId]=inv.total; }
  let total=0; for(const rid in byRoom) total+=byRoom[rid];
  return {total, byRoom, count:Object.keys(byRoom).length};
}
// Per-period utilities:
//  - waterUnits/elecUnits = PHYSICAL consumption from raw meters (for usage charts)
//  - waterRev/elecRev = BILLED revenue: prefer the saved invoice snapshot (units*rate at bill time),
//    fall back to a meter*current-rate estimate only for months that were never invoiced.
function utilityForPeriod(period){
  let waterUnits=0,elecUnits=0,waterRev=0,elecRev=0,waterResets=0,elecResets=0,have=false;
  for(const rid of state.rooms){
    const uw=usageForMonth(state.water,rid,period);
    const ue=usageForMonth(state.elec,rid,period);
    if(uw){have=true; if(uw.units>0)waterUnits+=uw.units; else if(uw.units<0)waterResets++;}
    if(ue){have=true; if(ue.units>0)elecUnits+=ue.units; else if(ue.units<0)elecResets++;}
    const inv=state.invoices.find(i=>i.roomId===rid && i.period===period);
    if(inv){
      have=true;
      const wu=num(inv.waterUnits), eu=num(inv.elecUnits);
      if(wu>0)waterRev+=wu*num(inv.waterRate);
      if(eu>0)elecRev+=eu*num(inv.elecRate);
    }else{
      const t=state.tenants[rid]||{};
      if(uw&&uw.units>0)waterRev+=uw.units*(+t.waterRate||0);
      if(ue&&ue.units>0)elecRev+=ue.units*(+t.elecRate||0);
    }
  }
  return {waterUnits,elecUnits,waterRev,elecRev,waterResets,elecResets,resets:waterResets+elecResets,have};
}
function costFor(period){const c=state.costs[period]||{};return {govWater:+c.govWater||0,govElec:+c.govElec||0,maintenance:+c.maintenance||0,note:c.note||""};}
// all periods relevant to dashboards (income + readings + costs)
function allYears(){
  const ys=new Set();
  const add=o=>Object.keys(o).forEach(p=>ys.add(parsePeriod(p).y));
  add(state.incomeHistory); add(state.water); add(state.elec); add(state.costs);
  state.invoices.forEach(i=>ys.add(parsePeriod(i.period).y));
  ys.add(new Date().getFullYear());
  return Array.from(ys).sort((a,b)=>b-a);
}

/* ==================== charts (self-contained SVG) ==================== */
function barChart(series, opts={}){
  // series: [{label, value, color}], opts:{color,height,fmt,showVal,signed}
  const w=opts.width||680, h=opts.height||220, padL=46, padB=30, padT=12, padR=8;
  const color=opts.color||"var(--brand)";
  const fmtV=opts.fmt||fmt0;
  const vals=series.map(s=>+s.value||0);
  const hasNeg=vals.some(v=>v<0);
  const signed=opts.signed||hasNeg;
  const iw=w-padL-padR, ih=h-padT-padB;
  const n=series.length||1;
  const bw=Math.min(46, iw/n*0.62);
  const step=iw/n;
  const posMax=Math.max(0,...vals), negMax=Math.max(0,...vals.map(v=>-v));
  const dTop=niceCeil(posMax||1), dBot=signed?niceCeil(negMax||0):0;
  const span=(dTop+dBot)||1;
  const y0=padT+(dTop/span)*ih;        // y-coordinate of value 0 (baseline)
  let g="";
  const ticks=4;
  for(let i=0;i<=ticks;i++){
    const v=dTop - span*i/ticks;
    const y=padT+((dTop-v)/span)*ih;
    g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;
    g+=`<text x="${padL-6}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--muted)">${fmtV(v)}</text>`;
  }
  series.forEach((s,i)=>{
    const v=+s.value||0;
    const bh=Math.abs(v)/span*ih;
    const x=padL+step*i+(step-bw)/2, y=v>=0? y0-bh : y0;
    const col = s.color||color;
    g+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="4" fill="${col}"><title>${esc(s.label)}: ${esc(fmtV(v))}</title></rect>`;
    if(opts.showVal && v!==0) g+=`<text x="${(x+bw/2).toFixed(1)}" y="${(v>=0?y-4:y+bh+11).toFixed(1)}" text-anchor="middle" font-size="9.5" fill="var(--muted)">${fmtV(v)}</text>`;
    g+=`<text x="${(x+bw/2).toFixed(1)}" y="${(h-padB+14)}" text-anchor="middle" font-size="10.5" fill="var(--muted)">${esc(s.label)}</text>`;
  });
  if(signed) g+=`<line x1="${padL}" y1="${y0.toFixed(1)}" x2="${w-padR}" y2="${y0.toFixed(1)}" stroke="var(--muted)" stroke-width="1.2"/>`;
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" role="img">${g}</svg>`;
}
function groupBarChart(labels, groups, opts={}){
  // groups: [{name,color,values:[]}]
  const w=opts.width||680,h=opts.height||240,padL=46,padB=30,padT=12,padR=8;
  const fmtV=opts.fmt||fmt0;
  let max=1; groups.forEach(g=>g.values.forEach(v=>{if(v>max)max=v;}));
  const niceMax=niceCeil(max);
  const iw=w-padL-padR, ih=h-padT-padB, n=labels.length||1, step=iw/n;
  const gap=6, gw=Math.min(40, step*0.7), bw=(gw-gap*(groups.length-1))/groups.length;
  let g="";
  const ticks=4;
  for(let i=0;i<=ticks;i++){const v=niceMax*i/ticks,y=padT+ih-(v/niceMax)*ih;
    g+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="var(--line)"/>`;
    g+=`<text x="${padL-6}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="var(--muted)">${fmtV(v)}</text>`;}
  labels.forEach((lab,i)=>{
    const bx=padL+step*i+(step-gw)/2;
    groups.forEach((grp,j)=>{
      const v=grp.values[i]||0, bh=Math.max(0,(v/niceMax)*ih);
      const x=bx+j*(bw+gap), y=padT+ih-bh;
      g+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="${grp.color}"><title>${esc(lab)} · ${esc(grp.name)}: ${esc(fmtV(v))}</title></rect>`;
    });
    g+=`<text x="${(bx+gw/2).toFixed(1)}" y="${h-padB+14}" text-anchor="middle" font-size="10.5" fill="var(--muted)">${esc(lab)}</text>`;
  });
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" role="img">${g}</svg>`;
}
function niceCeil(x){
  if(x<=0)return 1;
  const mag=Math.pow(10,Math.floor(Math.log10(x)));
  const f=x/mag;
  let nf; if(f<=1)nf=1;else if(f<=2)nf=2;else if(f<=2.5)nf=2.5;else if(f<=5)nf=5;else nf=10;
  return nf*mag;
}

    else{vac.style.display="none";}
  }
  if($("#t_sw"))$("#t_sw").oninput=updateVac;

function editReading(period){
  const readings= meterKind==="water"?state.water:state.elec;
  const isNew=!period;
  let defP=period;
  if(isNew){
    const ps=allReadingPeriods(readings).sort();
    const last=ps[ps.length-1];
    if(last){const {y,m}=parsePeriod(last);const d=new Date(y,m-1+1,1);defP=periodKey(d.getFullYear(),d.getMonth()+1);}
    else{const n=new Date();defP=periodKey(n.getFullYear(),n.getMonth()+1);}
  }
  const rec=readings[period]||{};
  const kindLabel=meterKind==="water"?"น้ำ 💧":"ไฟ ⚡";
  const yNow=new Date().getFullYear();
  const yearOpts=[];for(let y=yNow+1;y>=2024;y--)yearOpts.push(y);
  const {y:dy,m:dm}=parsePeriod(defP);
  openModal(`จดมิเตอร์${kindLabel} — ${isNew?'เดือนใหม่':periodLabel(period)}`,`
    ${isNew?`<div class="grid g2">
      <div class="field"><label class="f">เดือน</label><select id="mr_m">${TH_MONTHS.map((mn,i)=>`<option value="${i+1}" ${i+1===dm?'selected':''}>${mn}</option>`).join("")}</select></div>
      <div class="field"><label class="f">ปี (ค.ศ.)</label><select id="mr_y">${yearOpts.map(y=>`<option value="${y}" ${y===dy?'selected':''}>${y}</option>`).join("")}</select></div>
    </div>`:`<input type="hidden" id="mr_m" value="${dm}"><input type="hidden" id="mr_y" value="${dy}">`}
    <div class="hint" style="margin-bottom:10px">ใส่เลขที่อ่านได้จากหน้ามิเตอร์ของแต่ละห้อง</div>
    <div class="grid g3">
      ${state.rooms.map(r=>{const v=rec[r];return `<div class="field"><label class="f">ห้อง ${esc(roomLabel(r))}${tenantName(r)?' · '+esc(tenantName(r).split(' ')[0]):''}</label><input type="number" step="0.01" data-room="${r}" value="${v==null?'':v}" placeholder="เลขมิเตอร์"></div>`;}).join("")}
    </div>
  `,[
    ...(period?[{label:"ลบเดือนนี้",cls:"danger",act:()=>{if(confirm("ลบการจดมิเตอร์เดือนนี้?")){delete readings[period];save();closeModal();router();}}}]:[]),
    {label:"บันทึก",cls:"primary",act:()=>{
      const m=+$("#mr_m").value,y=+$("#mr_y").value;const p=periodKey(y,m);
      const obj=readings[p]?readings[p]:{};
      if(!obj._date) obj._date=`${p}-03`;
      $$("[data-room]").forEach(inp=>{
        const rid=inp.dataset.room;const val=inp.value.trim();
        if(val==="")delete obj[rid];else obj[rid]=num(val);
      });
      readings[p]=obj;
      save();closeModal();router();
    }}
  ]);
}

let invoiceForm={roomId:null,curP:null,prevP:null,billP:null,waterUnits:null,elecUnits:null,items:[],discount:0,deposit:null,note:null,issueDate:null,fresh:true};
let invoiceMode="normal"; // "normal" | "moveout"
function initInvoiceForm(rid){
  const water=state.water, elec=state.elec;
  const wps=roomReadingPeriods(water,rid), eps=roomReadingPeriods(elec,rid);
  const curP = wps.length?wps[wps.length-1]:(eps.length?eps[eps.length-1]:null);
  invoiceForm={
    roomId:rid, curP, prevP:null, billP:null,
    waterUnits:null, elecUnits:null, items:[], discount:0, deposit:null,
    note:state.settings.defaultNote||DEFAULT_NOTE, issueDate:todayISO(), fresh:false
  };
  recalcInvoiceReadings();
}
// Baseline (previous reading) for one meter, tenancy-aware.
// If the tenant has an initial (move-in) reading and there is no grid reading after move-in
// before curP, the initial reading is used as the floor — so a new tenant is never charged
// for water/elec used while the room was vacant / under maintenance.
function prevBaseline(kind, rid, curP){
  const readings = kind==="water"? state.water : state.elec;
  const t = state.tenants[rid]||{};
  const startVal = kind==="water"? t.startWater : t.startElec;
  const hasInit = t.moveInDate && startVal!=null && startVal!=="";
  const gp = curP? prevReadingPeriod(readings, rid, curP) : null;
  const gpDate = gp ? ((readings[gp] && readings[gp]._date)||`${gp}-03`) : null;
  if(hasInit && (!gp || (gpDate && gpDate < t.moveInDate))){
    return {value:num(startVal), label:"เริ่มต้น "+fmtDateTH(t.moveInDate), period:null, isInitial:true, ym:t.moveInDate.slice(0,7)};
  }
  if(gp) return {value:readingVal(readings,gp,rid), label:periodLabelShort(gp), period:gp, isInitial:false, ym:gp};
  return {value:null, label:null, period:null, isInitial:false, ym:null};
}
function recalcInvoiceReadings(){
  const rid=invoiceForm.roomId; if(!rid)return;
  const curP=invoiceForm.curP;
  const wCur = curP? readingVal(state.water,curP,rid) : null;
  const eCur = curP? readingVal(state.elec,curP,rid) : null;
  const wB = prevBaseline("water", rid, curP);
  const eB = prevBaseline("elec", rid, curP);
  invoiceForm.prevP = wB.period || eB.period || null;
  // default billing month = the month actually used (previous reading month, or the move-in month)
  if(invoiceForm.billP==null) invoiceForm.billP = wB.ym || eB.ym || curP || periodKey(new Date().getFullYear(), new Date().getMonth()+1);
  invoiceForm._wCur=wCur; invoiceForm._wPrev=wB.value; invoiceForm._wPrevLabel=wB.label; invoiceForm._wPrevP=wB.period; invoiceForm._wInit=wB.isInitial;
  if(invoiceForm.waterUnits==null) invoiceForm.waterUnits=(wCur!=null&&wB.value!=null)?(wCur-wB.value):0;
  invoiceForm._eCur=eCur; invoiceForm._ePrev=eB.value; invoiceForm._ePrevLabel=eB.label; invoiceForm._ePrevP=eB.period; invoiceForm._eInit=eB.isInitial;
  if(invoiceForm.elecUnits==null) invoiceForm.elecUnits=(eCur!=null&&eB.value!=null)?(eCur-eB.value):0;
  // water & elec baselines measured from different months => one side may span multiple months
  // (compare by ym, which is set even when the baseline is the move-in initial reading)
  invoiceForm._spanMismatch = !!(wB.ym && eB.ym && wB.ym!==eB.ym);
}

    <div class="no-print">
      <div class="card">
        <h3><span class="ic">🏠</span>เลือกห้อง & รอบบิล</h3>

          <select id="iv_bill">${billMonthOptions(invoiceForm.billP)}</select>

        </div>

function billMonthOptions(sel){
  const opts=[];const now=new Date();
  for(let i=-2;i<=13;i++){ // range around now & readings
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    opts.push(periodKey(d.getFullYear(),d.getMonth()+1));
  }
  // ensure sel & reading-based months included
  const set=new Set(opts);
  if(sel)set.add(sel);
  const arr=Array.from(set).sort().reverse();
  return arr.map(p=>`<option value="${p}" ${p===sel?'selected':''}>${periodLabel(p)}</option>`).join("");
}
function customLineHTML(it,i){
  const amt=num(it.qty)*num(it.price);
  return `<div class="inv-line" data-i="${i}">

    <input placeholder="รายการ เช่น ค่าทำความสะอาด" data-f="desc" value="${esc(it.desc||'')}">

}
function bindCustomLines(el){
  $$("#iv_items .inv-line",el).forEach(line=>{

function buildInvoiceObject(){
  const rid=invoiceForm.roomId; const t=state.tenants[rid]||{};
  const moveout=invoiceMode==="moveout";
  const wUnits=num(invoiceForm.waterUnits), eUnits=num(invoiceForm.elecUnits);
  const lines=[]; let no=1;
  if(!moveout) lines.push({no:no++,desc:"ค่าห้อง",units:1,price:+t.roomRate||0,amount:+t.roomRate||0});
  lines.push({no:no++,desc:"ค่าน้ำ",units:wUnits,price:+t.waterRate||0,amount:wUnits*(+t.waterRate||0),
    detail:`(${invoiceForm._wCur==null?'?':fmt0(invoiceForm._wCur)} - ${invoiceForm._wPrev==null?'?':fmt0(invoiceForm._wPrev)})`});
  lines.push({no:no++,desc:"ค่าไฟ",units:eUnits,price:+t.elecRate||0,amount:eUnits*(+t.elecRate||0),
    detail:`(${invoiceForm._eCur==null?'?':fmt0(invoiceForm._eCur)} - ${invoiceForm._ePrev==null?'?':fmt0(invoiceForm._ePrev)})`});
  invoiceForm.items.forEach((it)=>{
    if((it.desc&&it.desc.trim())||num(it.price)!==0)
      lines.push({no:no++,desc:it.desc||"รายการเพิ่มเติม",units:num(it.qty),price:num(it.price),amount:num(it.qty)*num(it.price)});
  });
  const subtotal=lines.reduce((a,l)=>a+l.amount,0);
  const discount=num(invoiceForm.discount);
  const charges=Math.max(0,subtotal-discount);
  const base={
    roomId:rid, roomLabel:roomLabel(rid), tenant:tenantName(rid), phone:t.phone||"",
    period:invoiceForm.billP, curP:invoiceForm.curP,
    issueDate:invoiceForm.issueDate||todayISO(),
    lines, subtotal, discount,
    note:invoiceForm.note||"",
    waterUnits:wUnits, elecUnits:eUnits, waterRate:+t.waterRate||0, elecRate:+t.elecRate||0
  };
  if(moveout){
    const deposit=invoiceForm.deposit==null?(+t.deposit||0):num(invoiceForm.deposit);
    const refund=deposit-charges; // >0 = refund to tenant, <0 = tenant owes more
    // income booked = utilities+other actually collected (charges); deposit is the tenant's own money
    return Object.assign(base, {type:"moveout", total:charges, deposit, refund});
  }
  return Object.assign(base, {type:"normal", total:charges});
}

function saveInvoice(){
  const inv=buildInvoiceObject();
  if(!inv.period){alert("กรุณาเลือกรอบบิล");return;}
  inv.id=uid(); inv.savedAt=todayISO();
  // replace existing invoice for same room+period
  state.invoices=state.invoices.filter(i=>!(i.roomId===inv.roomId && i.period===inv.period));
  state.invoices.push(inv);
  save();
  if(inv.type==="moveout"){
    toast("บันทึกสรุปย้ายออกห้อง "+inv.roomLabel+" แล้ว ✓");
    if(confirm("ตั้งห้อง "+inv.roomLabel+" เป็นว่างเลยไหม? (ล้างข้อมูลผู้เช่าปัจจุบัน — บิลที่บันทึกไว้ยังอยู่)")){
      const rt=state.tenants[inv.roomId]||{};
      state.tenants[inv.roomId]={firstName:"",lastName:"",phone:"",deposit:0,roomRate:num(rt.roomRate),elecRate:num(rt.elecRate),waterRate:num(rt.waterRate),occupied:false,moveInDate:"",startWater:null,startElec:null,note:""};
      save(); invoiceMode="normal";
      toast("ตั้งห้อง "+inv.roomLabel+" เป็นว่างแล้ว");
    }
  }else{
    toast("บันทึกบิลห้อง "+inv.roomLabel+" รอบ "+periodLabel(inv.period)+" แล้ว ✓");
  }
  renderInvoice($("#app"));
}

    </div>
    <div class="row-actions">
      <button class="btn primary" id="st_syncnow">☁️ ซิงค์ขึ้น Sheet ตอนนี้</button>
      <button class="btn ghost" id="st_reload">⬇️ โหลดจาก Sheet ใหม่</button>
    </div>
    <details style="margin-top:12px">
      <summary class="small muted" style="cursor:pointer">ตั้งค่าปลายทาง (Web App URL / Token)</summary>
      <div class="field" style="margin-top:8px"><label class="f">Apps Script Web App URL (/exec)</label><input id="st_url" value="${esc(cfg.url||'')}"></div>
      <div class="field"><label class="f">Token</label><input id="st_token" value="${esc(cfg.token||'')}"></div>
      <button class="btn sm" id="st_savecfg2">บันทึกปลายทาง & โหลดใหม่</button>
    </details>
    <div class="hint" style="margin-top:8px">แก้ไขในแอปจะเด้งขึ้น Sheet ให้อัตโนมัติ · ถ้าแก้ในชีตโดยตรง ให้กด “โหลดจาก Sheet ใหม่”</div>
  </div>

  <div class="card">
    <h3><span class="ic">💾</span>สำรอง / กู้คืนเป็นไฟล์</h3>
    <div class="row-actions">
      <button class="btn primary" id="st_export">⬇️ สำรองข้อมูล (ดาวน์โหลดไฟล์)</button>
      <button class="btn ghost" id="st_import">⬆️ กู้คืนจากไฟล์</button>
      <input type="file" id="st_file" accept="application/json" style="display:none">
    </div>
    <div class="hint">ไฟล์สำรองเป็น .json — เก็บไว้ใน Google Drive/iCloud หรือส่งเข้าอีเมลตัวเองก็ได้</div>
  </div>

  <div class="card">
    <h3><span class="ic">📝</span>ข้อความเริ่มต้น</h3>
    <div class="field"><label class="f">ชื่อหอพัก</label><input id="st_name" value="${esc(state.buildingName)}"></div>
    <div class="field"><label class="f">หมายเหตุ/ช่องทางชำระเงิน (ใช้เป็นค่าเริ่มต้นในบิล)</label><textarea id="st_note" rows="3">${esc(state.settings.defaultNote||'')}</textarea></div>
    <button class="btn primary" id="st_savecfg">บันทึกการตั้งค่า</button>
  </div>

  <div class="card">
    <h3><span class="ic">🧾</span>บิลที่บันทึกไว้ (${invCount})</h3>
    ${invCount?`<div class="tbl-wrap"><table>
      <thead><tr><th>รอบบิล</th><th>ห้อง</th><th>ผู้เช่า</th><th class="num">ยอดสุทธิ</th><th>วันที่ออก</th><th></th></tr></thead>
      <tbody>${state.invoices.slice().sort((a,b)=>(b.period+b.roomId).localeCompare(a.period+a.roomId)).map(inv=>`
        <tr><td>${esc(periodLabel(inv.period))}</td><td>${esc(inv.roomLabel)}${inv.type==="moveout"?' <span class="tag m" style="font-size:10px">ย้ายออก</span>':''}</td><td>${esc(inv.tenant||'-')}</td><td class="num">${fmt(inv.total)}</td><td>${fmtDateTH(inv.issueDate)}</td>
        <td><button class="btn sm danger" data-delinv="${esc(inv.id)}">ลบ</button></td></tr>`).join("")}</tbody>
    </table></div>`:'<div class="empty-state"><div class="em">🧾</div>ยังไม่มีบิลที่บันทึก</div>'}
  </div>

  <div class="card">
    <h3><span class="ic">♻️</span>รีเซ็ต</h3>
    <div class="row-actions">
      <button class="btn ghost" id="st_reseed">โหลดข้อมูลตัวอย่างจาก Excel ใหม่</button>
      <button class="btn danger" id="st_clear">ล้างข้อมูลทั้งหมด</button>
    </div>
    <div class="hint">“โหลดใหม่” = กลับไปใช้ข้อมูลชุดที่ดึงมาจากไฟล์ Excel ของคุณ (ลบบิล/ต้นทุนที่กรอกเพิ่ม)</div>
  </div>
  `;
  setSync(syncState, syncErr); // populate the status line
  $("#st_syncnow").onclick=async()=>{ const ok=await pushToSheet(); toast(ok?"ซิงค์ขึ้น Sheet แล้ว ✓":"ซิงค์ไม่สำเร็จ — ดูสถานะ"); };
  $("#st_reload").onclick=async()=>{ if(confirm("โหลดข้อมูลจาก Google Sheet มาทับข้อมูลในเครื่อง?")){ localStorage.setItem(DIRTYKEY,"0"); await bootSync(); toast("โหลดจาก Sheet แล้ว ✓"); } };
  $("#st_savecfg2").onclick=async()=>{ setApiCfg({url:$("#st_url").value.trim(), token:$("#st_token").value.trim()}); localStorage.setItem(DIRTYKEY,"0"); toast("บันทึกปลายทางแล้ว กำลังโหลด…"); await bootSync(); router(); };
  $("#st_export").onclick=exportData;
  $("#st_import").onclick=()=>$("#st_file").click();
  $("#st_file").onchange=importData;
  $("#st_savecfg").onclick=()=>{state.buildingName=$("#st_name").value.trim()||"หอพักเลขที่ 5";state.settings.defaultNote=$("#st_note").value;save();toast("บันทึกการตั้งค่าแล้ว ✓");router();};
  $$("[data-delinv]",el).forEach(b=>b.onclick=()=>{if(confirm("ลบบิลนี้?")){state.invoices=state.invoices.filter(i=>i.id!==b.dataset.delinv);save();renderSettings(el);}});
  $("#st_reseed").onclick=()=>{if(confirm("โหลดข้อมูลตัวอย่างจาก Excel ใหม่ทั้งหมด? (บิลและต้นทุนที่กรอกเองจะหาย)")){state=defaultState();save();toast("โหลดข้อมูลใหม่แล้ว");go("dashboard");}};
  $("#st_clear").onclick=()=>{if(confirm("ล้างข้อมูลทั้งหมดและเริ่มจากศูนย์?")){localStorage.removeItem(LSKEY);state=defaultState();save();go("dashboard");}};
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,1)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const d=new Date();const stamp=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  a.href=url;a.download=`backup-หอพัก5-${stamp}.json`;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast("ดาวน์โหลดไฟล์สำรองแล้ว ✓");
}
function importData(e){
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(!data||typeof data!=="object"||!Array.isArray(data.rooms)||!data.tenants||typeof data.tenants!=="object"||Array.isArray(data.tenants))
        throw new Error("ไฟล์ไม่ถูกต้อง");
      if(confirm("กู้คืนข้อมูลจากไฟล์นี้? ข้อมูลปัจจุบันจะถูกแทนที่")){
        state=normalizeState(data); save(); toast("กู้คืนข้อมูลสำเร็จ ✓"); go("dashboard");
      }
    }catch(err){alert("อ่านไฟล์ไม่สำเร็จ: "+err.message);}
  };
  r.readAsText(file);
  e.target.value="";
}

/* ==================== modal & toast ==================== */
function openModal(title,body,actions){
  const root=$("#modal-root");
  root.innerHTML=`<div class="modal-back"><div class="modal">
    <div class="mhead"><h3>${esc(title)}</h3><button class="iconbtn" id="m_x">✕</button></div>
    <div class="mbody">${body}</div>
    <div class="mfoot">${actions.map((a,i)=>`<button class="btn ${a.cls||''}" data-a="${i}">${esc(a.label)}</button>`).join("")}</div>
  </div></div>`;
  $("#m_x").onclick=closeModal;
  $(".modal-back").onclick=e=>{if(e.target.classList.contains("modal-back"))closeModal();};
  actions.forEach((a,i)=>{$(`[data-a="${i}"]`,root).onclick=a.act;});
}
function closeModal(){$("#modal-root").innerHTML="";}
let toastT=null;
function toast(msg){
  let t=$("#toast");
  if(!t){t=document.createElement("div");t.id="toast";t.style.cssText="position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#111827;color:#fff;padding:11px 18px;border-radius:10px;font-weight:600;font-size:14px;z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:opacity .2s";document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity="1";
  clearTimeout(toastT);toastT=setTimeout(()=>t.style.opacity="0",2400);
}

/* ==================== boot ==================== */
window.go=go;
if(!location.hash)location.hash="#/dashboard";
router();
setSync(apiCfg().url?"loading":"local");
bootSync();
</script>
</body>
</html>
